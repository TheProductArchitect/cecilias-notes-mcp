name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  smoke:
    name: smoke
    # macOS runner because package.json declares "os": ["darwin"] (this is a
    # macOS-only tool — it talks to the local iCloud container). Smoke test
    # uses CECILIAS_NOTES_CONTAINER to point at a temp dir, no real iCloud needed.
    runs-on: macos-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build + smoke test
        run: npm test
